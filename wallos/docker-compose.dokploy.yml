# Wallos для Dokploy: TLS даёт Traefik, сервис на dokploy-network с метками.
# WALLOS_DOMAIN — во вкладке Environment.

services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./data/db:/var/www/html/db
      - ./data/logos:/var/www/html/logos
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.wallos.rule=Host(`${WALLOS_DOMAIN}`)
      - traefik.http.routers.wallos.entrypoints=websecure
      - traefik.http.routers.wallos.tls.certresolver=letsencrypt
      - traefik.http.services.wallos.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true
