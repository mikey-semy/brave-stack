# brave-stack — общая сборка ВСЕХ сервисов для Dokploy
# (проброс портов + внешняя сеть dokploy-network вместо host-режима).
# Через include подтягиваются per-app *.dokploy.yml из папок.
#
# В Dokploy: тип сервиса Docker Compose, файл docker-compose.dokploy.yml,
# переменные (RELAY_HOST и пр.) — во вкладке Environment.

include:
  - rustdesk/docker-compose.dokploy.yml
  - vaultwarden/docker-compose.dokploy.yml   # TLS даёт Traefik, Caddy не нужен
  - ntfy/docker-compose.dokploy.yml
