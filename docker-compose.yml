# brave-stack — общая сборка ВСЕХ сервисов (standalone, без Dokploy).
# Через include подтягиваются per-app compose из папок — никакого дублирования.
# Запуск из корня репозитория:  docker compose up -d
#
# Конфиг берётся из корневого .env (RELAY_HOST и т.д.).

include:
  - rustdesk/docker-compose.yml
  - caddy/docker-compose.yml        # reverse-proxy + TLS (нужна сеть brave-web)
  - vaultwarden/docker-compose.yml  # менеджер паролей (за Caddy)
  - ntfy/docker-compose.yml         # пуш-уведомления (за Caddy)
  - uptime-kuma/docker-compose.yml  # мониторинг (за Caddy)
  - wallos/docker-compose.yml       # трекер подписок (за Caddy)
